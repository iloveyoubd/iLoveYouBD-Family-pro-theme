<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="100%" height="100%">
    <defs>
        <linearGradient id="shield-grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#00f0ff" />
            <stop offset="100%" stop-color="#7c3aed" />
        </linearGradient>
        <filter id="shield-glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3.5" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>
    
    <g transform="translate(10, 10)">
        <!-- Outer Glowing Shield Geometry -->
        <path d="M50,0 C75,0 90,12 90,38 C90,68 62,88 50,96 C38,88 10,68 10,38 C10,12 25,0 50,0 Z" fill="none" stroke="url(#shield-grad)" stroke-width="3" filter="url(#shield-glow)" />
        
        <!-- Inner Protective Outline with Dash Matrix -->
        <path d="M50,8 C70,8 82,18 82,38 C82,62 58,78 50,85 C42,78 18,62 18,38 C18,18 30,8 50,8 Z" fill="none" stroke="#00f0ff" stroke-width="1.5" stroke-dasharray="3,3" opacity="0.8" />
        
        <!-- Interactive cyber grid node center -->
        <!-- Circuit connections inside shield -->
        <line x1="50" y1="20" x2="50" y2="70" stroke="#7c3aed" stroke-width="2" />
        <line x1="50" y1="35" x2="32" y2="45" stroke="#00f0ff" stroke-width="1.5" />
        <line x1="50" y1="35" x2="68" y2="45" stroke="#00f0ff" stroke-width="1.5" />
        <line x1="50" y1="55" x2="28" y2="55" stroke="#00f0ff" stroke-width="1.5" />
        <line x1="50" y1="55" x2="72" y2="55" stroke="#00f0ff" stroke-width="1.5" />

        <!-- Circuit connection Node points -->
        <circle cx="50" cy="20" r="5" fill="#00f0ff" filter="url(#shield-glow)" />
        <circle cx="50" cy="20" r="2" fill="#ffffff" />
        
        <circle cx="32" cy="45" r="4" fill="#7c3aed" filter="url(#shield-glow)" />
        <circle cx="68" cy="45" r="4" fill="#7c3aed" filter="url(#shield-glow)" />
        
        <circle cx="28" cy="55" r="3.5" fill="#00f0ff" />
        <circle cx="72" cy="55" r="3.5" fill="#00f0ff" />

        <circle cx="50" cy="70" r="6" fill="#00ff66" filter="url(#shield-glow)" />
        <circle cx="50" cy="70" r="2.5" fill="#ffffff" />
    </g>
</svg>
