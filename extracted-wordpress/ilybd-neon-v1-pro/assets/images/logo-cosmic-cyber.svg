<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 120" width="100%" height="100%">
    <defs>
        <!-- Gradients -->
        <linearGradient id="cosmic-cyan-purple" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#00f0ff" />
            <stop offset="50%" stop-color="#8b5cf6" />
            <stop offset="100%" stop-color="#ec4899" />
        </linearGradient>
        <linearGradient id="cyber-glow-grad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#00f0ff" stop-opacity="0.8" />
            <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.8" />
        </linearGradient>
        <!-- Glowing Filter -->
        <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="4" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
        <filter id="strong-neon-glow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="8" result="blur1" />
            <feGaussianBlur stdDeviation="3" result="blur2" />
            <feMerge>
                <feMergeNode in="blur1" />
                <feMergeNode in="blur2" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <g transform="translate(10, 10)">
        <!-- Futuristic cyber icon / emblem -->
        <g transform="translate(0, 0)">
            <!-- Outer futuristic hexagon ring -->
            <polygon points="50,5 90,28 90,72 50,95 10,72 10,28" fill="none" stroke="url(#cosmic-cyan-purple)" stroke-width="3" filter="url(#neon-glow)" />
            <!-- Inner cyber node points and connection lines -->
            <polygon points="50,15 80,32 80,68 50,85 20,68 20,32" fill="none" stroke="#00f0ff" stroke-width="1" stroke-dasharray="2,2" />
            <!-- Connection grid lines -->
            <line x1="50" y1="5" x2="50" y2="95" stroke="#8b5cf6" stroke-width="1.5" opacity="0.7" />
            <line x1="10" y1="28" x2="90" y2="72" stroke="#8b5cf6" stroke-width="1" opacity="0.5" />
            <line x1="10" y1="72" x2="90" y2="28" stroke="#8b5cf6" stroke-width="1" opacity="0.5" />
            <!-- Central core energy sphere -->
            <circle cx="50" cy="50" r="14" fill="#070b13" stroke="url(#cosmic-cyan-purple)" stroke-width="2.5" filter="url(#strong-neon-glow)" />
            <circle cx="50" cy="50" r="6" fill="#00f0ff" filter="url(#neon-glow)" />
        </g>
        
        <!-- Typography -->
        <!-- "ILOVEYOUBD" Futuristic display text -->
        <text x="115" y="52" font-family="'Space Grotesk', sans-serif" font-size="34" font-weight="950" fill="#ffffff" letter-spacing="3" filter="url(#neon-glow)">
            ILOVE<tspan fill="url(#cosmic-cyan-purple)">YOU</tspan>BD
        </text>
        
        <!-- "CYBER ECOSYSTEM" Monospace subtitle -->
        <text x="118" y="80" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="12" font-weight="700" fill="#00f0ff" letter-spacing="4" filter="url(#neon-glow)">
            NEON CYBER PROTOCOL_
        </text>

        <!-- Tech grid line accent under the typography -->
        <line x1="115" y1="92" x2="450" y2="92" stroke="url(#cyber-glow-grad)" stroke-width="2" stroke-linecap="round" filter="url(#neon-glow)" />
        <!-- Micro data indicator dots -->
        <circle cx="458" cy="92" r="2" fill="#8b5cf6" />
        <circle cx="466" cy="92" r="2" fill="#00f0ff" />
        <circle cx="474" cy="92" r="2" fill="#ffffff" />
    </g>
</svg>
